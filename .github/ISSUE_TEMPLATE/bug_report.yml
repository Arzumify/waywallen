name: Bug report
description: Report something that is broken or behaves unexpectedly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
      placeholder: Waywallen crashes when...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: List the actions needed to trigger the issue.
      placeholder: |
        1. Open Waywallen
        2. Apply a wallpaper
    validations:
      required: true

  - type: dropdown
    id: install-source
    attributes:
      label: Install source
      options:
        - AppImage
        - Built from source
        - Distribution package
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Waywallen version
      description: Use the release version, commit hash
      placeholder: v0.1.0
    validations:
      required: true

  - type: dropdown
    id: desktop
    attributes:
      label: Desktop
      options:
        - KDE Plasma
        - GNOME
        - Hyprland
        - Niri
        - Sway
        - Other
    validations:
      required: true

  - type: input
    id: distro
    attributes:
      label: Linux distribution
      placeholder: Arch Linux, Fedora 43, Ubuntu 24.04, ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Paste relevant terminal output, crash messages, or journal logs.

        For AppImage, run:
        ```shell
        export RUST_LOG=debug,zbus=warn
        export RSTD_LOG=debug
        ./waywallen*.AppImage
        ```
      render: shell

  - type: textarea
    id: extra-context
    attributes:
      label: Additional context
      description: Add screenshots, recordings, config details, or anything else that helps.
