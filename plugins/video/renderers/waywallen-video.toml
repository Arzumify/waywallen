# waywallen-video — FFmpeg-based video renderer for waywallen.
#
# Iter 0 scaffold: software decode + Vulkan staging upload, no PTS pacing
# (a wall-clock 30fps cap caps the loop). Iter 1 shares the VkDevice with
# libs/ffmpeg's hwdevice; Iter 2 swaps to native Vulkan decode + GPU YUV→RGB.
#
# Coexists with waywallen-mpv at priority 50 (mpv = 100) so the daemon
# keeps routing video wallpapers to mpv by default. Flip priorities (or
# uninstall mpv) to switch.

[renderer]
name = "waywallen-video"
bin = "../../../bin/waywallen-video-renderer"
types = ["video"]
priority = 50
spawn_version = 1

[renderer.settings]
loop_file   = { type = "string", default = "inf",  identity = false }
hwdec       = { type = "string", default = "auto", identity = false }
render_node = { type = "string", default = "",     identity = true  }
